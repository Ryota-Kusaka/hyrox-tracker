<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYROX 減量ノート</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2025;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e9eb;
    --muted: #6b6f78;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --accent3: #f06090;
    --amber: #f0b060;
    --purple: #9060f0;
    --font-body: 'Noto Sans JP', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 28px 20px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 32px 36px; overflow-y: auto; }

  /* Sidebar */
  .logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .logo span { color: var(--muted); }
  .nav-label { font-size: 10px; letter-spacing: 0.15em; color: var(--muted); margin: 16px 0 6px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(200,240,96,0.1); color: var(--accent); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .stat-label { font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Section header */
  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
  .section-title { font-size: 18px; font-weight: 500; }
  .section-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  /* Today's missions */
  .day-label-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .day-type-badge { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; font-family: var(--font-mono); letter-spacing: 0.05em; }

  .mission-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 28px; }
  .mission-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .mission-item:hover { border-color: var(--border2); background: var(--surface2); }
  .mission-item.done { border-color: rgba(200,240,96,0.25); background: rgba(200,240,96,0.05); }
  .mission-check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .mission-item.done .mission-check { background: var(--accent); border-color: var(--accent); }
  .checkmark { color: #0e0f11; font-size: 12px; font-weight: 700; opacity: 0; transition: opacity 0.1s; }
  .mission-item.done .checkmark { opacity: 1; }
  .mission-text { flex: 1; }
  .mission-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .mission-item.done .mission-title { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(200,240,96,0.4); }
  .mission-detail { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .mission-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border2); color: var(--muted); font-family: var(--font-mono); margin-top: 4px; display: inline-block; }

  /* Progress bar */
  .progress-wrap { margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }

  /* Calendar */
  .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 28px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cal-nav { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; }
  .cal-nav:hover { color: var(--text); border-color: var(--border2); }
  .cal-month { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.1em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); padding: 6px 0; text-transform: uppercase; font-family: var(--font-mono); }
  .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; position: relative; gap: 2px; }
  .cal-day:hover { background: var(--surface2); }
  .cal-day.today { border-color: var(--border2); color: var(--text); font-weight: 500; }
  .cal-day.other-month { color: var(--muted); opacity: 0.4; }
  .cal-day.perfect { background: rgba(200,240,96,0.15); border-color: rgba(200,240,96,0.3); }
  .cal-day.partial { background: rgba(240,176,96,0.1); border-color: rgba(240,176,96,0.2); }
  .cal-day.selected { border-color: var(--accent); }
  .cal-dots { display: flex; gap: 2px; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-dot.amber { background: var(--amber); }

  /* Weight log */
  .weight-section { margin-bottom: 28px; }
  .weight-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .weight-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 14px; color: var(--text); font-family: var(--font-mono); width: 120px; outline: none; transition: border-color 0.15s; }
  .weight-input:focus { border-color: var(--accent); }
  .log-btn { background: var(--accent); color: #0e0f11; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font-body); transition: opacity 0.15s; }
  .log-btn:hover { opacity: 0.85; }
  .weight-history { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
  .weight-entry { display: flex; justify-content: space-between; padding: 7px 12px; background: var(--surface); border-radius: 6px; font-size: 12px; }
  .weight-entry-date { color: var(--muted); font-family: var(--font-mono); }
  .weight-entry-val { font-family: var(--font-mono); font-weight: 500; }

  /* Memo */
  .memo-area { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 13px; font-family: var(--font-body); line-height: 1.7; resize: vertical; min-height: 100px; outline: none; transition: border-color 0.15s; }
  .memo-area:focus { border-color: var(--border2); }
  .save-btn { margin-top: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 18px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: var(--font-mono); letter-spacing: 0.05em; transition: all 0.15s; }
  .save-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .saved-flash { font-size: 11px; color: var(--accent); margin-left: 10px; opacity: 0; transition: opacity 0.3s; }

  /* View toggle */
  .view-toggle { display: flex; gap: 0; background: var(--surface2); border-radius: 8px; padding: 3px; margin-bottom: 24px; width: fit-content; }
  .view-btn { padding: 6px 16px; border-radius: 6px; border: none; background: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
  .view-btn.active { background: var(--surface); color: var(--text); }

  /* Calorie tracker */
  .calorie-bar-wrap { margin-bottom: 20px; }
  .calorie-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .calorie-nums { font-family: var(--font-mono); }
  .macro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .macro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .macro-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .macro-val { font-family: var(--font-mono); font-size: 18px; font-weight: 500; }
  .macro-unit { font-size: 11px; color: var(--muted); }

  /* Page views */
  .page { display: none; }
  .page.active { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">HYROX<br><span>減量ノート 2025</span></div>
    <span class="nav-label">メニュー</span>
    <button class="nav-item active" onclick="showPage('today')">
      <div class="nav-dot" style="background:var(--accent)"></div>今日のミッション
    </button>
    <button class="nav-item" onclick="showPage('calendar')">
      <div class="nav-dot" style="background:var(--accent2)"></div>カレンダー
    </button>
    <button class="nav-item" onclick="showPage('weight')">
      <div class="nav-dot" style="background:var(--amber)"></div>体重ログ
    </button>
    <button class="nav-item" onclick="showPage('plan')">
      <div class="nav-dot" style="background:var(--purple)"></div>プラン確認
    </button>

    <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--border);">
      <div style="font-size:10px; color:var(--muted); line-height:1.8;">
        目標：97.5 → 84.5 kg<br>
        期間：4ヶ月（〜7月末）<br>
        目標カロリー：2,626 kcal/日
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- TODAY PAGE -->
    <div id="page-today" class="page active">
      <div class="stats-row" id="stats-row"></div>

      <div class="section-header">
        <div class="section-title">今日のミッション</div>
        <div class="section-date" id="today-date"></div>
      </div>

      <div class="day-label-bar">
        <div id="day-type-badge" class="day-type-badge"></div>
        <div style="font-size:12px; color:var(--muted);" id="day-calorie-hint"></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>達成率</span>
          <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div class="mission-list" id="mission-list"></div>

      <div style="margin-bottom:20px;">
        <div style="font-size:13px; font-weight:500; margin-bottom:10px;">今日のメモ</div>
        <textarea class="memo-area" id="memo-area" placeholder="気づいたこと、体調、食事内容など..."></textarea>
        <div style="display:flex;align-items:center;">
          <button class="save-btn" onclick="saveMemo()">保存 →</button>
          <span class="saved-flash" id="saved-flash">保存しました</span>
        </div>
      </div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="page-calendar" class="page">
      <div class="section-header">
        <div class="section-title">達成カレンダー</div>
      </div>
      <div class="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">← 前月</button>
          <div class="cal-month" id="cal-month-label"></div>
          <button class="cal-nav" onclick="changeMonth(1)">次月 →</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div id="cal-detail" style="display:none;" class="calendar-wrap">
        <div style="font-size:13px; font-weight:500; margin-bottom:12px;" id="cal-detail-date"></div>
        <div id="cal-detail-missions"></div>
      </div>
    </div>

    <!-- WEIGHT PAGE -->
    <div id="page-weight" class="page">
      <div class="section-header">
        <div class="section-title">体重ログ</div>
      </div>
      <div class="weight-section">
        <div style="font-size:13px; font-weight:500; margin-bottom:10px;">今日の体重を記録</div>
        <div class="weight-input-row">
          <input class="weight-input" type="number" id="weight-input" placeholder="97.5" step="0.1" min="50" max="200">
          <span style="font-size:13px; color:var(--muted);">kg</span>
          <button class="log-btn" onclick="logWeight()">記録</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
          <div class="stat-card">
            <div class="stat-label">開始時</div>
            <div class="stat-value" style="color:var(--amber);">97.5<span style="font-size:14px;"> kg</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">現在（最新記録）</div>
            <div class="stat-value" style="color:var(--accent);" id="current-weight">—</div>
            <div class="stat-sub" id="weight-diff"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">目標体重</div>
            <div class="stat-value" style="color:var(--accent2);">84.5<span style="font-size:14px;"> kg</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">残り</div>
            <div class="stat-value" id="remaining-weight" style="color:var(--accent3);">—</div>
          </div>
        </div>
        <div style="font-size:13px; font-weight:500; margin-bottom:10px;">記録履歴</div>
        <div class="weight-history" id="weight-history"></div>
      </div>
    </div>

    <!-- PLAN PAGE -->
    <div id="page-plan" class="page">
      <div class="section-header">
        <div class="section-title">週間プラン</div>
      </div>
      <div style="display:grid; gap:10px;">
        <!-- plan cards rendered by JS -->
      </div>
      <div id="plan-cards"></div>

      <div style="margin-top:28px; margin-bottom:16px;">
        <div class="section-title" style="font-size:16px; margin-bottom:16px;">カロリー設計</div>
        <div class="macro-grid">
          <div class="macro-card">
            <div class="macro-label">タンパク質</div>
            <div class="macro-val" style="color:var(--accent);">175</div>
            <div class="macro-unit">g / 日</div>
          </div>
          <div class="macro-card">
            <div class="macro-label">脂質</div>
            <div class="macro-val" style="color:var(--amber);">70</div>
            <div class="macro-unit">g / 日</div>
          </div>
          <div class="macro-card">
            <div class="macro-label">炭水化物</div>
            <div class="macro-val" style="color:var(--accent2);">295</div>
            <div class="macro-unit">g / 日</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const STORAGE_KEY = 'hyrox_tracker_v1';

// ── Data definitions ────────────────────────────────────────────
const DAYS = ['日','月','火','水','木','金','土'];

const DAY_PLANS = {

    label: '完全休養日', color: 'var(--muted)',

// ── State ────────────────────────────────────────────
let state = loadState();
let calViewYear, calViewMonth;
const now = new Date();
calViewYear = now.getFullYear();
calViewMonth = now.getMonth();

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ── Pages ────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const idx = ['today','calendar','weight','plan'].indexOf(name);
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'weight') renderWeightHistory();
  if (name === 'plan') renderPlan();
}

// ── Today Page ────────────────────────────────────────────
function renderToday() {
  const d = new Date();
  const dow = d.getDay();
  const plan = DAY_PLANS[dow];
  const key = todayKey();

  if (!state[key]) state[key] = { done: {}, memo: '' };

  document.getElementById('today-date').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[dow]}）`;

  const badge = document.getElementById('day-type-badge');
  badge.textContent = plan.label;
  badge.style.background = plan.color + '22';
  badge.style.color = plan.color;
  badge.style.border = `1px solid ${plan.color}44`;

  document.getElementById('day-calorie-hint').textContent = plan.hint;

  const list = document.getElementById('mission-list');
  list.innerHTML = '';
  plan.missions.forEach(m => {
    const done = !!state[key].done[m.id];
    const el = document.createElement('div');
    el.className = 'mission-item' + (done ? ' done' : '');
    el.innerHTML = `
      <div class="mission-check"><span class="checkmark">✓</span></div>
      <div class="mission-text">
        <div class="mission-title">${m.title}</div>
        <div class="mission-detail">${m.detail}</div>
        <span class="mission-tag">${m.tag}</span>
      </div>`;
    el.onclick = () => toggleMission(m.id, key, dow);
    list.appendChild(el);
  });

  updateProgress(key, dow);
  renderStats();

  const memo = document.getElementById('memo-area');
  memo.value = state[key].memo || '';
}

function toggleMission(id, key, dow) {
  if (!state[key]) state[key] = { done: {}, memo: '' };
  state[key].done[id] = !state[key].done[id];
  saveState();
  renderToday();
}

function updateProgress(key, dow) {
  const plan = DAY_PLANS[dow];
  const total = plan.missions.length;
  const done = Object.values(state[key]?.done || {}).filter(Boolean).length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${Math.round(done/total*100)}%`;
}

function saveMemo() {
  const key = todayKey();
  if (!state[key]) state[key] = { done: {}, memo: '' };
  state[key].memo = document.getElementById('memo-area').value;
  saveState();
  const flash = document.getElementById('saved-flash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 1500);
}

function renderStats() {
  const keys = Object.keys(state).filter(k => k.match(/^\d{4}-\d{2}-\d{2}$/));
  let perfect = 0, partial = 0, streak = 0;

  keys.forEach(k => {
    const dow = new Date(k + 'T00:00:00').getDay();
    const plan = DAY_PLANS[dow];
    const total = plan.missions.length;
    const done = Object.values(state[k]?.done || {}).filter(Boolean).length;
    if (done === total && total > 0) perfect++;
    else if (done > 0) partial++;
  });

  // streak calculation
  let d = new Date();
  while (true) {
    const k = getDateKey(d.getFullYear(), d.getMonth(), d.getDate());
    const dow = d.getDay();
    const plan = DAY_PLANS[dow];
    const total = plan.missions.length;
    const done = Object.values(state[k]?.done || {}).filter(Boolean).length;
    if (done === total && total > 0) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  const weights = state['__weights'] || [];
  const latestW = weights.length > 0 ? weights[weights.length-1].w : null;
  const lost = latestW ? (97.5 - latestW).toFixed(1) : '—';

  const container = document.getElementById('stats-row');
  container.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">完璧達成日</div>
      <div class="stat-value" style="color:var(--accent)">${perfect}</div>
      <div class="stat-sub">日間</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">連続達成</div>
      <div class="stat-value" style="color:var(--accent2)">${streak}</div>
      <div class="stat-sub">日ストリーク</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累計減量</div>
      <div class="stat-value" style="color:var(--amber)">${lost}</div>
      <div class="stat-sub">kg 減</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">残り目標</div>
      <div class="stat-value" style="color:var(--accent3)">${latestW ? Math.max(0,latestW-84.5).toFixed(1) : '13.0'}</div>
      <div class="stat-sub">kg</div>
    </div>`;
}

// ── Calendar Page ────────────────────────────────────────────
function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${calViewYear}年 ${calViewMonth+1}月`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(calViewYear, calViewMonth, 1).getDay();
  const days = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const prevDays = new Date(calViewYear, calViewMonth, 0).getDate();
  const todayStr = todayKey();

  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - first + i + 1;
    grid.appendChild(el);
  }

  for (let d = 1; d <= days; d++) {
    const key = getDateKey(calViewYear, calViewMonth, d);
    const dow = new Date(calViewYear, calViewMonth, d).getDay();
    const plan = DAY_PLANS[dow];
    const total = plan.missions.length;
    const done = Object.values(state[key]?.done || {}).filter(Boolean).length;

    const el = document.createElement('div');
    let cls = 'cal-day';
    if (key === todayStr) cls += ' today';
    if (done === total && total > 0) cls += ' perfect';
    else if (done > 0) cls += ' partial';
    el.className = cls;

    el.innerHTML = `<span style="font-size:12px;">${d}</span>`;
    if (done > 0) {
      const dots = document.createElement('div');
      dots.className = 'cal-dots';
      const isPerfect = done === total;
      for (let i = 0; i < Math.min(done, 3); i++) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot' + (isPerfect ? '' : ' amber');
        dots.appendChild(dot);
      }
      el.appendChild(dots);
    }
    el.onclick = () => showCalDetail(key, d, dow, done, total);
    grid.appendChild(el);
  }

  const remaining = 42 - first - days;
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

function showCalDetail(key, d, dow, done, total) {
  const plan = DAY_PLANS[dow];
  const detail = document.getElementById('cal-detail');
  detail.style.display = 'block';
  document.getElementById('cal-detail-date').textContent =
    `${calViewYear}年${calViewMonth+1}月${d}日（${DAYS[dow]}） — ${done}/${total} 達成`;

  const list = document.getElementById('cal-detail-missions');
  list.innerHTML = '';
  plan.missions.forEach(m => {
    const isDone = !!state[key]?.done[m.id];
    const el = document.createElement('div');
    el.style.cssText = 'display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;';
    el.innerHTML = `
      <span style="color:${isDone?'var(--accent)':'var(--muted)'};">${isDone?'✓':'○'}</span>
      <span style="color:${isDone?'var(--text)':'var(--muted)'};">${m.title}</span>`;
    list.appendChild(el);
  });

  if (state[key]?.memo) {
    const memo = document.createElement('div');
    memo.style.cssText = 'margin-top:12px;font-size:12px;color:var(--muted);line-height:1.7;';
    memo.textContent = '📝 ' + state[key].memo;
    list.appendChild(memo);
  }
}

function changeMonth(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  renderCalendar();
}

// ── Weight Page ────────────────────────────────────────────
function logWeight() {
  const val = parseFloat(document.getElementById('weight-input').value);
  if (!val || val < 50 || val > 200) return;
  if (!state['__weights']) state['__weights'] = [];
  const key = todayKey();
  state['__weights'] = state['__weights'].filter(e => e.d !== key);
  state['__weights'].push({ d: key, w: val });
  state['__weights'].sort((a,b) => a.d.localeCompare(b.d));
  saveState();
  renderWeightHistory();
  renderStats();
}

function renderWeightHistory() {
  const weights = state['__weights'] || [];
  const latest = weights[weights.length-1];

  if (latest) {
    document.getElementById('current-weight').textContent = latest.w.toFixed(1) + ' kg';
    const diff = (97.5 - latest.w).toFixed(1);
    document.getElementById('weight-diff').textContent = diff > 0 ? `▼ ${diff} kg 減` : `変化なし`;
    document.getElementById('remaining-weight').textContent = Math.max(0, latest.w - 84.5).toFixed(1) + ' kg';
  }

  const hist = document.getElementById('weight-history');
  hist.innerHTML = '';
  [...weights].reverse().forEach(e => {
    const el = document.createElement('div');
    el.className = 'weight-entry';
    el.innerHTML = `<span class="weight-entry-date">${e.d}</span><span class="weight-entry-val">${e.w.toFixed(1)} kg</span>`;
    hist.appendChild(el);
  });
}

// ── Plan Page ────────────────────────────────────────────
function renderPlan() {
  const container = document.getElementById('plan-cards');
  container.innerHTML = '';
  [1,2,3,4,5,6,0].forEach(dow => {
    const plan = DAY_PLANS[dow];
    const card = document.createElement('div');
    card.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;';
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--muted);">${DAYS[dow]}</span>
        <span style="font-size:13px;font-weight:500;">${plan.label}</span>
        <span style="margin-left:auto;font-size:11px;font-family:var(--font-mono);color:${plan.color};">${plan.calorie} kcal</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${plan.missions.map(m=>`<div style="font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:baseline;"><span style="color:var(--border2);">›</span>${m.title}</div>`).join('')}
      </div>`;
    container.appendChild(card);
  });
}

// ── Init ────────────────────────────────────────────
renderToday();
</script>
